<!-- ===================================================================
     BEZ ?t= → tohle není hostovská stránka, ale veřejný plánovač.
     Přesměruj na /vylety/#planovac a přemapuj starý ?ring= na ?zona=.
     S TOKENEM se NEPŘESMĚROVÁVÁ — odkazy villarudolf.com/pruvodce/?t=…
     chodí hostům v potvrzení rezervace a na QR kódech, nesmí se rozbít.
     GitHub Pages neumí 301, proto inline skript + <noscript> fallback.
     =================================================================== -->
<script>
(function () {
  try {
    var q = new URLSearchParams(location.search);
    if (q.get('t')) return;                     // host → nechat být
    var RZ = { foot: 'pesky', car: 'auto', day: 'den' };
    var out = new URL('../vylety/', location.href);
    var zona = RZ[(q.get('ring') || '').toLowerCase()];
    if (zona) out.searchParams.set('zona', zona);
    ['lang', 'season'].forEach(function (k) { if (q.get(k)) out.searchParams.set(k, q.get(k)); });
    out.hash = '#planovac';
    location.replace(out.pathname + out.search + out.hash);
  } catch (e) {
    location.replace('/vylety/#planovac');
  }
})();
</script>
